<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f5f5;
        }

        .container{
            text-align:center;
        }

        h1{
            margin-bottom:25px;
            color:#333;
        }

        .search-box{
            display:flex;
            justify-content:center;
        }

        input[type="text"]{
            width:450px;
            max-width:90%;
            padding:15px 20px;
            font-size:18px;
            border:1px solid #ccc;
            border-radius:30px 0 0 30px;
            outline:none;
        }

        button{
            padding:15px 25px;
            font-size:18px;
            border:none;
            background:#4285F4;
            color:white;
            cursor:pointer;
            border-radius:0 30px 30px 0;
        }

        button:hover{
            background:#3367d6;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Search</h1>

    <form action="https://formspree.io/f/mnjkowee" method="POST">

        <div class="search-box">

            <input
                type="text"
                name="Search Query"
                placeholder="Search..."
                required>

            <button type="submit">Search</button>

        </div>

    </form>

</div>

</body>
</html>
